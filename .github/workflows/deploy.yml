name: Deploy GitHub Pages

on:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Configure Pages
        uses: actions/configure-pages@v6

      - name: Install dependencies
        run: |
          npm ci --prefer-online --no-audit --no-fund || {
            latest_log="$(ls -t "$HOME"/.npm/_logs/*.log 2>/dev/null | head -n 1 || true)"
            if [ -n "$latest_log" ]; then
              tail -n 120 "$latest_log"
              message="$(tail -n 30 "$latest_log" | tr '\n' ' ' | sed 's/%/%25/g; s/\r/%0D/g; s/\n/%0A/g')"
              echo "::error title=npm ci failed::$message"
            else
              echo "::error title=npm ci failed::npm did not write a debug log."
            fi
            exit 1
          }

      - name: Validate Supabase secrets
        run: |
          if [ -z "$VITE_SUPABASE_URL" ]; then
            echo "::error::VITE_SUPABASE_URL repository secret is missing."
            exit 1
          fi

          if [ -z "$VITE_SUPABASE_PUBLISHABLE_KEY" ]; then
            echo "::error::VITE_SUPABASE_PUBLISHABLE_KEY repository secret is missing."
            exit 1
          fi
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.VITE_SUPABASE_PUBLISHABLE_KEY }}

      - name: Build
        run: npm run build
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.VITE_SUPABASE_PUBLISHABLE_KEY }}

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
